<!DOCTYPE html>
<html lang="en">
<head>
    <title>Color Changer</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex justify-center items-center h-screen gap-4">

    <button id="red" class="button bg-red-500 text-white px-6 py-2 rounded-lg">
        Red
    </button>

    <button id="blue" class="button bg-blue-500 text-white px-6 py-2 rounded-lg">
        Blue
    </button>

    <button id="green" class="button bg-green-500 text-white px-6 py-2 rounded-lg">
        Green
    </button>

    <button id="yellow" class="button bg-yellow-400 text-black px-6 py-2 rounded-lg">
        Yellow
    </button>
    <button id="orange" class="button bg-orange-500 text-white px-6 py-2 rounded-lg">
        Orange
    </button>
    <script src="script.js"></script>
</body>
</html>
